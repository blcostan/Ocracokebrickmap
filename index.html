<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn | Garden Brick Finder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --fig-green: #2d5a27; --sand: #fdfaf5; --brick: #b06d50; --wood: #7d6e64; --highlight: #ff3b3b; }
        body { font-family: 'Georgia', serif; background-color: var(--sand); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .map-sidebar { width: 320px; background: white; border-right: 2px solid #ddd; display: flex; flex-direction: column; padding: 20px; z-index: 10; overflow-y: auto; }
        .map-container { position: relative; width: 100%; border: 3px solid #ccc; border-radius: 8px; overflow: hidden; cursor: pointer; background: #eee; }
        .map-container img { width: 100%; display: block; }
        
        #locator-dot {
            position: absolute; width: 20px; height: 20px; background: var(--highlight); 
            border: 3px solid white; border-radius: 50%; display: none;
            box-shadow: 0 0 15px rgba(255, 59, 59, 1); z-index: 20; 
            transform: translate(-50%, -50%); animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } }

        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }
        .search-controls { display: flex; gap: 8px; margin-bottom: 10px; }
        #search { padding: 12px; flex: 1; border-radius: 20px; border: 2px solid #ccc; font-size: 16px; outline: none; }
        #next-btn { padding: 10px 15px; border-radius: 20px; border: none; background: var(--fig-green); color: white; cursor: pointer; font-weight: bold; display: none; }
        
        #status-bar { font-size: 11px; color: #666; margin-bottom: 10px; text-align: center; }

        .container { padding: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .plaza { display: inline-flex; flex-direction: column; gap: 4px; padding: 10px; margin-bottom: 40px; align-items: center; }
        .row-container { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; margin-bottom: 2px; }
        .row-label { position: absolute; left: -40px; font-size: 9px; color: #999; width: 30px; text-align: right; }
        .row-grid { display: grid; gap: 4px; justify-content: center; }
        
        .brick { width: 85px; height: 45px; background: var(--brick); border: 1px solid #4a3728; display: flex; align-items: center; justify-content: center; padding: 4px; font-size: 8px; font-weight: bold; text-align: center; color: white; line-height: 1.1; overflow: hidden; }
        .brick.match { background: #ffd54f !important; color: #000 !important; border: 2px solid orange; }
        .brick.active-match { transform: scale(1.1); box-shadow: 0 0 15px rgba(0,0,0,0.4); z-index: 5; outline: 3px solid var(--highlight); }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }
        .brick.is-blank { background: #eeeae0; border: 1px dashed #ccc; color: transparent; pointer-events: none; }
        .brick.is-commons { background: var(--wood); border: 1px solid #fff; font-size: 9px; }
        
        .lawn { width: 80%; height: 60px; background: #8da58e; margin: 20px 0; border-radius: 30px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-transform: uppercase; border: 2px solid #6d8c6d; }
    </style>
</head>
<body>

    <div class="map-sidebar">
        <div id="status-bar">Connecting to Garden Data...</div>
        <div class="search-controls">
            <input type="text" id="search" placeholder="Type a name...">
            <button id="next-btn">NEXT</button>
        </div>
        <div id="match-count" style="text-align:center; margin-bottom:10px; font-size:12px; font-weight:bold;"></div>

        <div class="map-container" onclick="scrollToPath()">
            <img src="rendering%20of%20garden.avif" alt="Garden Map">
            <div id="locator-dot"></div>
        </div>
        <p style="font-size:10px; color:#666; text-align:center; margin-top:15px;">
            <b>North Path is Top | South Path is Bottom</b>
        </p>
    </div>

    <div class="main-content">
        <div class="container">
            <h3 style="color:var(--fig-green);">NORTHERN GARDEN SECTION</h3>
            <div id="north-section" class="plaza"></div>
            
            <div class="lawn">Central Lawn</div>
            
            <h3 style="color:var(--fig-green);">SOUTHERN ENTRANCE SECTION</h3>
            <div id="south-section" class="plaza"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv';
        let matchedBricks = [];
        let currentMatchIndex = 0;

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                document.getElementById('status-bar').innerText = "Data Synced: Found " + data.length + " bricks.";

                data.forEach(row => {
                    // Normalize Section names
                    let s = String(row.Section || "").trim();
                    // THE FLIP: Spreadsheet "North" becomes App "South" and vice-versa
                    if (s.toLowerCase().includes("north")) row.MappedSec = "South";
                    else if (s.toLowerCase().includes("south")) row.MappedSec = "North";
                    
                    row.R = parseInt(row.Row);
                    row.C = parseInt(row.Col);
                });

                // Render North Section (Spreadsheet South): R1 is near the lawn (bottom of this group)
                renderGrid('north-section', data.filter(b => b.MappedSec === "North"), true);
                
                // Render South Section (Spreadsheet North): R1 is at the entrance (bottom of this group)
                renderGrid('south-section', data.filter(b => b.MappedSec === "South"), true);
            }
        });

        function renderGrid(containerId, bricks, reverseRows) {
            const container = document.getElementById(containerId);
            const grid = {};
            let maxRow = 0;

            bricks.forEach(b => {
                if (b.R > maxRow) maxRow = b.R;
                if (!grid[b.R]) grid[b.R] = {};
                grid[b.R][b.C] = b;
            });

            // Loop to create rows
            for (let r = (reverseRows ? maxRow : 1); reverseRows ? r >= 1 : r <= maxRow; reverseRows ? r-- : r++) {
                if (!grid[r]) continue;
                
                const rowWrapper = document.createElement('div');
                rowWrapper.className = 'row-container';
                rowWrapper.innerHTML = `<div class="row-label">R${r}</div>`;
                
                const rowGrid = document.createElement('div');
                rowGrid.className = 'row-grid';
                
                const cols = Object.keys(grid[r]).map(Number);
                const maxCol = Math.max(...cols);
                rowGrid.style.gridTemplateColumns = `repeat(${maxCol}, 1fr)`;

                for (let c = 1; c <= maxCol; c++) {
                    const brick = grid[r][c];
                    const bDiv = document.createElement('div');
                    
                    if (brick) {
                        const isBlank = (brick.Inscription || "").includes("[BLANK]");
                        const isCommons = (brick.Inscription || "").includes("COMMONS");
                        bDiv.className = isCommons ? 'brick is-commons' : (isBlank ? 'brick is-blank' : 'brick');
                        bDiv.innerText = isBlank ? "" : brick.Inscription;
                        bDiv.dataset.search = (brick.Inscription + " " + (brick["Searchable Names"] || "")).toLowerCase();
                        bDiv.dataset.section = brick.MappedSec;
                    } else {
                        bDiv.className = 'brick is-blank';
                    }
                    rowGrid.appendChild(bDiv);
                }
                rowWrapper.appendChild(rowGrid);
                container.appendChild(rowWrapper);
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            matchedBricks = [];
            currentMatchIndex = 0;

            document.querySelectorAll('.brick').forEach(b => {
                const isMatch = val !== "" && b.dataset.search && b.dataset.search.includes(val);
                b.classList.toggle('match', isMatch);
                b.classList.toggle('hidden', val !== "" && !isMatch);
                if (isMatch) matchedBricks.push(b);
            });
            updateUI();
        });

        function updateUI() {
            const dot = document.getElementById('locator-dot');
            const next = document.getElementById('next-btn');
            document.querySelectorAll('.brick').forEach(b => b.classList.remove('active-match'));

            if (matchedBricks.length > 0) {
                const cur = matchedBricks[currentMatchIndex];
                cur.classList.add('active-match');
                dot.style.display = 'block';
                // North Path is roughly 35% down the map, South Path is 70%
                dot.style.top = (cur.dataset.section === "North") ? "35%" : "70%";
                dot.style.left = "54%";
                next.style.display = matchedBricks.length > 1 ? 'block' : 'none';
                document.getElementById('match-count').innerText = matchedBricks.length + " Matches Found";
            } else {
                dot.style.display = 'none';
                next.style.display = 'none';
                document.getElementById('match-count').innerText = "";
            }
        }

        document.getElementById('next-btn').onclick = () => {
            currentMatchIndex = (currentMatchIndex + 1) % matchedBricks.length;
            updateUI();
            scrollToPath();
        };

        function scrollToPath() {
