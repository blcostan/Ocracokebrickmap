<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn Garden Finder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --fig-green: #2d5a27; --sand: #fdfaf5; --brick: #b06d50; --wood: #7d6e64; --highlight: #ff3b3b; }
        body { font-family: 'Georgia', serif; background: var(--sand); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .map-sidebar { width: 320px; background: white; border-right: 2px solid #ddd; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
        .map-container { position: relative; width: 100%; border: 2px solid #ccc; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .map-container img { width: 100%; display: block; pointer-events: none; }
        
        #locator-dot { 
            position: absolute; width: 22px; height: 22px; background: var(--highlight); 
            border: 3px solid white; border-radius: 50%; display: none; 
            transform: translate(-50%, -50%); z-index: 100; 
            box-shadow: 0 0 15px rgba(255, 59, 59, 0.8);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }

        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; scroll-behavior: smooth; }
        .search-area { display: flex; gap: 8px; margin-bottom: 10px; }
        #search { padding: 12px; flex: 1; border-radius: 20px; border: 2px solid #ccc; font-size: 16px; outline: none; }
        #next-btn { padding: 10px 15px; border-radius: 20px; border: none; background: var(--fig-green); color: white; cursor: pointer; font-weight: bold; display: none; }
        
        .plaza { display: inline-flex; flex-direction: column; gap: 4px; margin-bottom: 40px; align-items: center; }
        .row-container { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 2px; }
        .row-label { position: absolute; left: -45px; font-size: 10px; color: #999; }
        .row-grid { display: grid; gap: 4px; }
        
        .brick { width: 85px; height: 45px; background: var(--brick); border: 1px solid #4a3728; color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 8px; font-weight: bold; padding: 4px; line-height: 1.1; }
        .brick.match { background: #ffd54f !important; color: black !important; border: 2px solid orange; }
        .brick.active-match { transform: scale(1.1); box-shadow: 0 0 15px rgba(0,0,0,0.4); outline: 3px solid var(--highlight); z-index: 5; }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }
        .brick.is-blank { background: #eeeae0; border: 1px dashed #ccc; color: transparent; }
        .lawn { width: 300px; height: 50px; background: #8da58e; margin: 20px 0; border-radius: 25px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid #6d8c6d; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="map-sidebar">
    <div id="status-bar" style="font-weight:bold; color:var(--fig-green); margin-bottom:10px; font-size: 12px;">Syncing Garden...</div>
    <div class="search-area">
        <input type="text" id="search" placeholder="Search a name...">
        <button id="next-btn">NEXT</button>
    </div>
    <div id="match-count" style="font-size:12px; margin-bottom:10px; font-weight: bold;"></div>
    
    <div class="map-container" onclick="scrollToCurrent()">
        <img src="rendering%20of%20garden.avif">
        <div id="locator-dot"></div>
    </div>
    <p style="font-size:10px; color:#999; text-align:center; margin-top:10px;">Tap map to jump to brick</p>
</div>

<div class="main-content">
    <h3 style="color:var(--fig-green)">NORTHERN GARDEN SECTION</h3>
    <div id="north-section" class="plaza"></div>
    
    <div class="lawn">CENTRAL LAWN</div>
    
    <h3 style="color:var(--fig-green)">SOUTHERN ENTRANCE SECTION</h3>
    <div id="south-section" class="plaza"></div>
</div>
