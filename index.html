<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn Garden Finder</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --fig-green: #2d5a27; --sand: #fdfaf5; --brick: #b06d50; --highlight: #ff3b3b; }
        body { font-family: 'Georgia', serif; background: var(--sand); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .map-sidebar { width: 320px; background: white; border-right: 2px solid #ddd; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; z-index: 10; flex-shrink: 0; }
        .search-area { display: flex; gap: 8px; margin-bottom: 10px; }
        #search { padding: 12px; flex: 1; border-radius: 20px; border: 2px solid #ccc; font-size: 16px; outline: none; }
        #status-bar { font-weight:bold; color:var(--fig-green); margin-bottom:10px; font-size: 12px; }
        .main-content { flex: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; scroll-behavior: smooth; }
        .plaza { display: flex; flex-direction: column; gap: 8px; margin-bottom: 60px; align-items: center; }
        .row-container { display: flex; align-items: center; justify-content: center; position: relative; padding: 2px 0; }
        .row-label { position: absolute; left: -65px; font-size: 11px; font-weight: bold; color: #777; width: 55px; text-align: right; }
        .row-bricks { display: flex; gap: 6px; justify-content: center; align-items: stretch; }
        .brick { width: 105px; min-height: 60px; background: var(--brick); border: 1px solid #4a3728; color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 9px; font-weight: bold; padding: 8px; line-height: 1.3; box-sizing: border-box; flex-shrink: 0; }
        .brick.match { background: #ffd54f !important; color: black !important; border: 2px solid orange; transform: scale(1.02); }
        .brick.is-blank { background: #e0dcd0; border: 1px dashed #bbb; color: transparent; }
        .lawn { width: 450px; height: 70px; background: #8da58e; margin: 30px 0; border-radius: 35px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; border: 2px solid #6d8c6d; }
    </style>
</head>
<body>

<div class="map-sidebar">
    <div id="status-bar">Syncing with Garden...</div>
    <div class="search-area">
        <input type="text" id="search" placeholder="Search for a name...">
    </div>
    <img src="rendering%20of%20garden.avif" style="width:100%; border-radius:8px; border: 1px solid #ccc;">
</div>

<div class="main-content">
    <div id="north-section" class="plaza"></div>
    <div class="lawn">CENTRAL LAWN</div>
    <div id="south-section" class="plaza"></div>
</div>

<script>
    const S_URL = 'https://duanluepelrjjkulpenh.supabase.co'; 
    const S_KEY = 'sb_publishable_WHslguojU3jb1GyQBqc_MA_2w35Y2ou';
    const gardenClient = window.supabase.createClient(S_URL, S_KEY);

    async function fetchGarden() {
        const status = document.getElementById('status-bar');
        const { data, error } = await gardenClient.from('Ocracoke Bricks -').select('*');

        if (error) {
            status.innerHTML = `<span style="color:red">Error: ${error.message}</span>`;
            return;
        }
        renderGarden(data);
    }

    function renderGarden(data) {
        data.forEach(row => {
            let sec = (row.section || row.Section || "").toLowerCase();
            
            // CORRECTION: Database North = South Path | Database South = North Path
            row.MappedSec = sec.includes("north") ? "South" : "North";
            
            row.R = parseInt(row.row || row.Row) || 0;
            row.C = parseInt(row.col || row.Col) || 0;
            row.Inscr = row.inscription || row.Inscription || "";
        });

        // NORTH PATH (Database says "South"): Row 1 is near the lawn (Reversed)
        draw('north-section', data.filter(b => b.MappedSec === "North"), true, "NORTH PATH");
        
        // SOUTH PATH (Database says "North"): Row 1 is at the entrance (Normal)
        draw('south-section', data.filter(b => b.MappedSec === "South"), false, "SOUTH PATH (ENTRANCE)");
        
        document.getElementById('status-bar').innerText = "Live: " + data.length + " bricks.";
    }
