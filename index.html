<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn | Fig Garden Brick Finder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --island-green: #2d5a27;
            --sand-bg: #f8f5f0;
            --brick-clay: #b06d50;
            --brick-border: #5d4037;
            --driftwood: #7d6e64;
            --accent-gold: #ffc107;
            --grass: #7ea37e;
        }

        body { 
            font-family: 'Georgia', serif; 
            background-color: var(--sand-bg);
            margin: 0; 
            overflow-x: hidden;
            color: #333;
        }

        /* Fixed Fig Decorations on the sides */
        body::before, body::after {
            content: '🍃';
            position: fixed;
            top: 50%;
            font-size: 5rem;
            opacity: 0.15;
            z-index: -1;
            filter: grayscale(0.2);
        }
        body::before { left: 5%; content: '🌿\A\A🍃\A\A🌿'; white-space: pre; transform: translateY(-50%); }
        body::after { right: 5%; content: '🍃\A\A🌿\A\A🍃'; white-space: pre; transform: translateY(-50%); }

        .header { 
            position: sticky; 
            top: 0; 
            width: 100%; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 30px 0; 
            z-index: 1000; 
            text-align: center; 
            border-bottom: 6px solid var(--island-green);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 { margin: 0; color: var(--island-green); letter-spacing: 2px; text-transform: uppercase; font-size: 1.8rem; }
        .header h2 { margin: 5px 0 20px 0; font-size: 1rem; color: var(--driftwood); font-weight: normal; letter-spacing: 4px; }

        input { 
            padding: 15px 25px; 
            width: 80%; 
            max-width: 450px; 
            border-radius: 50px; 
            border: 2px solid #cededc; 
            font-size: 16px; 
            outline: none; 
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        input:focus { border-color: var(--island-green); background: #fff; }

        .map-container { 
            position: relative;
            padding: 60px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 1;
        }

        .plaza { 
            display: inline-flex; 
            flex-direction: column; 
            gap: 8px; 
            background: rgba(255, 255, 255, 0.6);
            padding: 20px; 
            border-radius: 4px; 
            border: 1px solid #dcd7cc;
            margin-bottom: 40px; 
        }

        .row { display: grid; gap: 8px; justify-content: center; margin-bottom: 2px; }

        .brick { 
            width: 120px; 
            height: 60px; 
            background: var(--brick-clay); 
            border: 1px solid var(--brick-border); 
            border-radius: 2px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 6px; 
            font-size: 9px; 
            font-weight: bold; 
            text-align: center; 
            color: white; 
            line-height: 1.2; 
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2);
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .brick:hover { transform: scale(1.05); filter: brightness(1.1); z-index: 2; }
        .brick.is-blank { background: #e0ddd5; border: 1px dashed #b5b0a5; box-shadow: none; pointer-events: none; }
        
        .brick.center-stone { 
            background: var(--driftwood); 
            font-size: 16px; 
            height: 100px; 
            border: 4px double var(--brick-border); 
            letter-spacing: 2px;
        }

        .brick.match { 
            background: var(--accent-gold) !important; 
            color: #000 !important; 
            transform: scale(1.25); 
            z-index: 100; 
            border: 2px solid #d4a017;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }

        .lawn { 
            width: 95%; 
            max-width: 780px; 
            height: 60px; 
            background: var(--grass);
            margin: 40px 0; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            font-size: 0.9rem;
            border: 2px solid #6d8c6d;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .label { 
            font-family: sans-serif;
            font-weight: bold; 
            color: var(--island-green); 
            margin: 20px 0; 
            text-transform: uppercase; 
            font-size: 13px; 
            letter-spacing: 3px;
        }

        @media (max-width: 760px) {
            .brick { width: 14vw; height: 10vw; font-size: 1.5vw; }
            body::before, body::after { display: none; } /* Hide side figs on small screens to save space */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Island Inn</h1>
        <h2>Fig Garden Memorial Bricks</h2>
        <input type="text" id="search" placeholder="Search by name or keyword...">
    </div>

    <div class="map-container">
        <div class="label">North Path (Top of Garden)</div>
        <div id="north-section" class="plaza"></div>
        
        <div class="lawn">Centeral Lawn Area</div>
        
        <div id="south-section" class="plaza"></div>
        <div class="label">South Path (Bottom of Garden)</div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv';

        Papa.parse(CSV_URL, {
            download: true, 
            header: true, 
            skipEmptyLines: true,
            dynamicTyping: true,
            transformHeader: h => h.trim(),
            complete: function(results) {
                const data = results.data;
                const northBricks = data.filter(b => String(b.Section).trim() === 'North');
                const southBricks = data.filter(b => String(b.Section).trim() === 'South');

                renderSection('north-section', northBricks, true); 
                renderSection('south-section', southBricks, false);
            }
        });

        function renderSection(containerId, bricks, reverseRows) {
            const container = document.getElementById(containerId);
            const rowMap = {};

            bricks.forEach(b => {
                const r = b.Row;
                const c = b.Col;
                if (!rowMap[r]) rowMap[r] = {};
                rowMap[r][c] = b;
            });

            let sortedRowKeys = Object.keys(rowMap).sort((a, b) => parseInt(a) - parseInt(b));
            if (reverseRows) sortedRowKeys.reverse();

            sortedRowKeys.forEach(rowKey => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                const colsInRow = rowMap[rowKey];
                const colIndices = Object.keys(colsInRow).map(k => parseInt(k));
                const maxCol = Math.max(...colIndices, 5);

                rowDiv.style.gridTemplateColumns = `repeat(${maxCol}, 1fr)`;

                const centerStone = Object.values(colsInRow).find(b => 
                    b.Inscription && b.Inscription.toUpperCase().includes("ISLAND INN COMMONS")
                );

                if (centerStone) {
                    const bDiv = document.createElement('div');
                    bDiv.className = 'brick center-stone';
                    bDiv.style.gridColumn = `span ${maxCol}`;
                    bDiv.innerText = "ISLAND INN COMMONS";
                    rowDiv.appendChild(bDiv);
                } else {
                    for (let c = 1; c <= maxCol; c++) {
                        const brick = colsInRow[c];
                        const bDiv = document.createElement('div');
                        if (brick) {
                            const text = (brick.Inscription || "").trim();
                            const isBlank = text === "" || text.toUpperCase().includes("[BLANK]");
                            bDiv.className = 'brick' + (isBlank ? ' is-blank' : '');
                            bDiv.innerText = isBlank ? "" : text;
                            bDiv.dataset.search = (text + " " + (brick["Searchable Names"] || "")).toLowerCase();
                            if (!isBlank) {
                                bDiv.onclick = () => alert(`"${text}"\nRow ${rowKey}, Column ${c}`);
                            }
                        } else {
                            bDiv.className = 'brick is-blank';
                        }
                        rowDiv.appendChild(bDiv);
                    }
                }
                container.appendChild(rowDiv);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.brick').forEach(b => {
                if (b.classList.contains('center-stone') || b.classList.contains('is-blank')) return;
                const match = b.dataset.search && b.dataset.search.includes(term);
                if (term === "") { b.classList.remove('match', 'hidden'); } 
                else { b.classList.toggle('match', !!match); b.classList.toggle('hidden', !match); }
            });
        });
    </script>
</body>
</html>
