<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn | Fig Garden Brick Finder</title>
    <style>
        :root {
            --fig-green: #2d5a27; --sand: #fdfaf5;
            --brick: #b06d50; --ocean: #0077be; --wood: #7d6e64;
        }
        body { font-family: 'Georgia', serif; background-color: var(--sand); margin: 0; color: #333; }
        
        .header { position: sticky; top: 0; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 20px 0; z-index: 1000; text-align: center; border-bottom: 5px solid var(--ocean); }
        
        /* Updated to use your GitHub AVIF link */
        .render-map { width: 90%; max-width: 600px; margin: 15px auto; border: 2px solid #ddd; border-radius: 4px; display: block; }
        
        #search { padding: 12px 20px; width: 80%; max-width: 400px; border-radius: 25px; border: 2px solid #aec4c2; font-size: 16px; margin-top: 10px; outline: none; }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .plaza { display: inline-flex; flex-direction: column; gap: 6px; background: rgba(255, 255, 255, 0.5); padding: 12px; border: 1px solid #dcd7cc; margin-bottom: 30px; }
        .row { display: grid; gap: 5px; justify-content: center; }
        
        .brick { width: 100px; height: 50px; background: var(--brick); border: 1px solid #4a3728; display: flex; align-items: center; justify-content: center; padding: 5px; font-size: 8px; font-weight: bold; text-align: center; color: white; line-height: 1.1; cursor: pointer; transition: 0.2s; }
        .brick.is-blank { background: #eeeae0; border: 1px dashed #ccc; color: transparent; pointer-events: none; }
        .brick.match { background: #ffd54f !important; color: #000 !important; transform: scale(1.15); z-index: 10; border: 2px solid orange; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }
        
        .brick.center-stone { background: var(--wood); font-size: 13px; height: 80px; border: 4px double #fff; grid-column: 1 / -1; width: 100%; }
        .lawn { width: 100%; max-width: 700px; height: 50px; background: #8da58e; margin: 20px 0; border-radius: 25px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; border: 3px solid #6d8c6d; }
        .label { font-weight: bold; color: var(--fig-green); margin: 10px 0; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }

        @media (max-width: 600px) { .brick { width: 14vw; height: 10vw; font-size: 1.5vw; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Island Inn Fig Garden</h1>
        <img src="rendering%20of%20garden.avif" class="render-map" alt="Garden Map">
        <input type="text" id="search" placeholder="Search names (e.g., Sam Jones, Norvell)...">
    </div>
    <div class="container">
        <div class="label">North Path (Fig Garden)</div>
        <div id="north-section" class="plaza"></div>
        <div class="lawn">Central Lawn</div>
        <div id="south-section" class="plaza"></div>
        <div class="label">South Path</div>
    </div>

    <script>
        // Sample data from your directory 
        const brickData = [
            {s:"North", r:2, c:2, i:"LET THE GOOD BEGIN"},
            {s:"North", r:4, c:2, i:"SAM JONES", n:"Sam Jones"},
            {s:"North", r:12, c:2, i:"OCRACOKE VARIETY STORE"},
            {s:"North", r:14, c:1, i:"SUSAN AND EDWARD NORVELL", n:"Susan Norvell, Edward Norvell"},
            {s:"South", r:3, c:1, i:"DAVID GUGLIELMO ALICE & BILL MARROW", n:"David Guglielmo, Alice Marrow, Bill Marrow"},
            {s:"South", r:20, c:3, i:"ISLAND INN COMMONS"},
            {s:"South", r:38, c:3, i:"IN MEMORY OF DEAN AND BARB MILLER", n:"Dean Miller, Barb Miller"}
        ];

        function render(id, sectionName, totalRows, rev) {
            const container = document.getElementById(id);
            for (let r = 1; r <= totalRows; r++) {
                const rowNum = rev ? (totalRows - r + 1) : r;
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.style.gridTemplateColumns = `repeat(6, 1fr)`;

                for (let c = 1; c <= 6; c++) {
                    const b = brickData.find(d => d.s === sectionName && d.r === rowNum && d.c === c);
                    const bDiv = document.createElement('div');
                    
                    if (b && b.i === "ISLAND INN COMMONS") {
                        bDiv.className = 'brick center-stone';
                        bDiv.innerText = b.i;
                    } else if (b) {
                        bDiv.className = 'brick';
                        bDiv.innerText = b.i;
                        bDiv.dataset.search = (b.i + " " + (b.n || "")).toLowerCase();
                    } else {
                        bDiv.className = 'brick is-blank';
                    }
                    rowDiv.appendChild(bDiv);
                }
                container.appendChild(rowDiv);
            }
        }

        // Render based on the directory row counts [cite: 16, 34]
        render('north-section', 'North', 42, true); 
        render('south-section', 'South', 40, false);

        document.getElementById('search').addEventListener('input', (e) => {
            const t = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.brick').forEach(b => {
                if (b.classList.contains('is-blank') || b.classList.contains('center-stone')) return;
                const m = b.dataset.search && b.dataset.search.includes(t);
                if (t === "") { b.classList.remove('match', 'hidden'); } 
                else { b.classList.toggle('match', !!m); b.classList.toggle('hidden', !m); }
            });
        });
    </script>
</body>
</html>
