<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn Memorial Brick Finder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --brick-bg: #b08d73;
            --brick-border: #5d4037;
            --highlight: #ffd54f;
            --lawn: #7ea37e;
            --blank-bg: #e0e0e0;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { position: sticky; top: 0; width: 100%; background: white; padding: 20px 0; z-index: 1000; text-align: center; border-bottom: 4px solid var(--brick-border); }
        input { padding: 12px; width: 85%; max-width: 450px; border-radius: 25px; border: 2px solid #ddd; font-size: 16px; }
        .map-container { padding: 40px 10px; display: flex; flex-direction: column; align-items: center; width: 100%; min-height: 400px; }
        .plaza { display: inline-flex; flex-direction: column; gap: 4px; background: #d3d3d3; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: repeat(6, 120px); gap: 4px; justify-content: center; }
        .brick { width: 120px; height: 60px; background: var(--brick-bg); border: 1px solid var(--brick-border); border-radius: 2px; display: flex; align-items: center; justify-content: center; padding: 5px; font-size: 9px; font-weight: bold; text-align: center; color: white; line-height: 1.1; box-sizing: border-box; }
        .brick.is-blank { background: var(--blank-bg); border: 1px dashed #bbb; color: transparent; cursor: default; }
        .brick.center-stone { grid-column: span 6; width: 100%; height: 80px; background: #8d6e63; font-size: 14px; }
        .brick.match { background: var(--highlight) !important; color: #000; transform: scale(1.1); z-index: 10; border-color: orange; }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }
        .lawn { width: 90%; max-width: 800px; height: 120px; background: var(--lawn); margin: 20px 0; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .label { font-weight: bold; color: #888; margin: 10px 0; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Island Inn Memorial Brick Finder</h2>
        <input type="text" id="search" placeholder="Search by name...">
    </div>

    <div id="loading-msg" style="padding: 50px;">Loading brick data...</div>

    <div class="map-container">
        <div class="label">Northwest Section (Photos 1 & 2)</div>
        <div id="nw-section" class="plaza"></div>
        <div class="lawn">MIDDLE LAWN</div>
        <div class="label">Southeast Section (Photos 3 & 4)</div>
        <div id="se-section" class="plaza"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCxdMjqCBt1D7Q2smwitwiyt0U0fbRaRbcbzkJ5j84wVtn8w4I58cglPweA9gf0s1dcQKo_Gl8rdE8/pub?output=csv';

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Data loaded:", results.data.length, "rows");
                document.getElementById('loading-msg').style.display = 'none';
                
                const data = results.data;
                
                // Top Sections
                const nwData = data.filter(b => b['Photo Section'] === 'Photo 1' || b['Photo Section'] === 'Photo 2');
                renderSection('nw-section', nwData);
                
                // Bottom Sections
                const seData = data.filter(b => b['Photo Section'] === 'Photo 3' || b['Photo Section'] === 'Photo 4');
                renderSection('se-section', seData);
            },
            error: function(err) {
                document.getElementById('loading-msg').innerText = "Error loading spreadsheet. Please check if it is Published to Web.";
                console.error(err);
            }
        });

        function renderSection(containerId, bricks) {
            const container = document.getElementById(containerId);
            const rowMap = {};

            bricks.forEach(b => {
                const r = b.Row || "Unknown";
                if (!rowMap[r]) rowMap[r] = [];
                rowMap[r].push(b);
            });

            const sortedRows = Object.keys(rowMap).sort((a, b) => {
                if (a === 'Center') return -1;
                if (b === 'Center') return 1;
                return parseInt(a) - parseInt(b);
            });

            sortedRows.forEach(rowKey => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                const rowBricks = rowMap[rowKey];

                if (rowKey === 'Center') {
                    const bDiv = document.createElement('div');
                    bDiv.className = 'brick center-stone';
                    bDiv.innerText = rowBricks[0].Inscription;
                    rowDiv.appendChild(bDiv);
                } else {
                    for (let col = 1; col <= 6; col++) {
                        const brick = rowBricks.find(b => String(b.Col) === String(col));
                        const bDiv = document.createElement('div');
                        if (brick) {
                            const isBlank = brick.Inscription.toUpperCase().includes("BLANK");
                            bDiv.className = 'brick' + (isBlank ? ' is-blank' : '');
                            bDiv.innerText = isBlank ? "" : brick.Inscription;
                            if (!isBlank) bDiv.onclick = () => alert(brick.Inscription);
                        } else {
                            bDiv.className = 'brick is-blank';
                        }
                        rowDiv.appendChild(bDiv);
                    }
                }
                container.appendChild(rowDiv);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.brick').forEach(b => {
                if (b.classList.contains('is-blank') || b.classList.contains('center-stone')) return;
                const match = b.innerText.toLowerCase().includes(term);
                b.classList.toggle('match', term !== "" && match);
                b.classList.toggle('hidden', term !== "" && !match);
            });
        });
    </script>
</body>
</html>
