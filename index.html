<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn Memorial Brick Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --brick-bg: #b08d73;
            --brick-border: #5d4037;
            --highlight: #ffd54f;
            --lawn: #7ea37e;
        }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; text-align: center; }
        
        .header { 
            position: sticky; top: 0; background: white; padding: 20px; z-index: 1000; 
            border-bottom: 3px solid var(--brick-border); box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input { padding: 12px; width: 80%; max-width: 400px; border-radius: 20px; border: 1px solid #ccc; font-size: 16px; }

        .map-area { display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* The Grid Logic */
        .plaza-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            background: #ddd; 
            padding: 10px; 
            border-radius: 5px;
        }

        .row { 
            display: grid; 
            grid-template-columns: repeat(6, 120px); /* Strictly 6 bricks wide */
            gap: 5px; 
            justify-content: center;
        }

        .brick {
            width: 120px; height: 60px; background: var(--brick-bg);
            border: 1px solid var(--brick-border); border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            padding: 5px; font-size: 9px; font-weight: bold; text-align: center; 
            cursor: pointer; color: white; line-height: 1.2; box-sizing: border-box;
        }
        
        /* Empty space holder for missing bricks in the grid */
        .empty { width: 120px; height: 60px; background: rgba(0,0,0,0.03); border: 1px dashed #ccc; }

        .brick.match { background: var(--highlight) !important; color: #000; transform: scale(1.1); z-index: 10; border-color: orange; }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }

        /* Environmental Elements */
        .lawn { 
            width: 100%; max-width: 750px; height: 180px; background: var(--lawn); 
            margin: 20px 0; border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; color: white; font-weight: bold;
        }
        .label { font-weight: bold; color: #666; margin: 15px 0 5px 0; text-transform: uppercase; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Memorial Brick Finder</h2>
        <input type="text" id="search" placeholder="Type a name to highlight brick...">
    </div>

    <div class="map-area">
        <div class="label">Northwest Path (Photo 1)</div>
        <div id="nw-plaza" class="plaza-grid"></div>
        
        <div class="lawn">MIDDLE LAWN AREA</div>
        
        <div class="label">Southeast Plaza (Photos 2, 3, 4)</div>
        <div id="se-plaza" class="plaza-grid"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv';

        Papa.parse(CSV_URL, {
            download: true, header: true,
            complete: function(results) {
                const data = results.data.filter(b => b.Inscription && b.Inscription.trim() !== "");
                
                // Render Top Section
                renderGrid('nw-plaza', data.filter(b => b['Photo Section'] === 'Photo 1'));
                
                // Render Bottom Section (Starting with Photo 3/Lawn side)
                renderGrid('se-plaza', data.filter(b => b['Photo Section'] !== 'Photo 1'));
            }
        });

        function renderGrid(containerId, bricks) {
            const container = document.getElementById(containerId);
            
            // Get unique row numbers and sort them
            const rowList = [...new Set(bricks.map(b => b.Row))].sort((a, b) => {
                if (a === 'Center' || b === 'Center') return 0;
                return parseInt(a) - parseInt(b);
            });

            rowList.forEach(rowNum => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                
                // Get bricks for this specific row
                const bricksInRow = bricks.filter(b => b.Row === rowNum);
                
                // Always create 6 slots per row (Columns 1 through 6)
                for (let col = 1; col <= 6; col++) {
                    const brick = bricksInRow.find(b => parseInt(b.Col) === col);
                    
                    if (brick) {
                        const bDiv = document.createElement('div');
                        bDiv.className = 'brick';
                        bDiv.innerText = brick.Inscription;
                        bDiv.title = `Row: ${brick.Row}, Col: ${brick.Col}`;
                        bDiv.onclick = () => alert(brick.Inscription);
                        rowDiv.appendChild(bDiv);
                    } else {
                        // Create a placeholder for empty brick slots to keep alignment
                        const empty = document.createElement('div');
                        empty.className = 'empty';
                        rowDiv.appendChild(empty);
                    }
                }
                container.appendChild(rowDiv);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.brick').forEach(b => {
                const match = b.innerText.toLowerCase().includes(term);
                if (term === "") {
                    b.classList.remove('match', 'hidden');
                } else {
                    b.classList.toggle('match', match);
                    b.classList.toggle('hidden', !match);
                }
            });
        });
    </script>
</body>
</html>
