<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn | Brick Finder with Navigation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --fig-green: #2d5a27; --sand: #fdfaf5; --brick: #b06d50; --ocean: #0077be; --wood: #7d6e64; --highlight: #ff3b3b; }
        body { font-family: 'Georgia', serif; background-color: var(--sand); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Map Area */
        .map-sidebar { width: 320px; background: white; border-right: 2px solid #ddd; display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        .map-container { position: relative; width: 100%; border: 3px solid #ccc; border-radius: 8px; overflow: hidden; cursor: pointer; background: #eee; }
        .map-container img { width: 100%; display: block; pointer-events: none; }
        
        #locator-dot {
            position: absolute; width: 24px; height: 24px; background: var(--highlight); 
            border: 3px solid white; border-radius: 50%; display: none;
            box-shadow: 0 0 20px rgba(255, 59, 59, 1); z-index: 20; 
            transform: translate(-50%, -50%); animation: pulse 0.8s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }
        .header { position: sticky; top: 0; width: 100%; background: white; padding: 15px 0; z-index: 1000; text-align: center; border-bottom: 4px solid var(--ocean); }
        
        .search-controls { display: flex; gap: 10px; justify-content: center; align-items: center; width: 90%; max-width: 500px; margin: 0 auto; }
        #search { padding: 12px 20px; flex: 1; border-radius: 25px; border: 2px solid #aec4c2; font-size: 16px; outline: none; }
        
        #next-btn { 
            padding: 10px 20px; border-radius: 20px; border: none; 
            background: var(--fig-green); color: white; cursor: pointer; 
            font-weight: bold; display: none; transition: background 0.2s;
        }
        #next-btn:hover { background: #1e3d1a; }
        #match-count { font-size: 12px; color: #666; margin-top: 5px; }

        .container { padding: 40px 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .plaza { display: inline-flex; flex-direction: column; gap: 4px; padding: 10px; margin-bottom: 40px; align-items: center; }
        .row-container { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; margin-bottom: 2px; }
        .row-label { position: absolute; left: -50px; font-size: 10px; color: #bbb; font-family: sans-serif; }
        .row-grid { display: grid; gap: 5px; justify-content: center; }
        
        .brick { 
            width: 90px; height: 46px; background: var(--brick); border: 1px solid #4a3728; 
            display: flex; align-items: center; justify-content: center; padding: 4px; 
            font-size: 8px; font-weight: bold; text-align: center; color: white; line-height: 1.1; 
        }
        .brick.match { background: #ffd54f !important; color: #000 !important; border: 2px solid orange; opacity: 1 !important; filter: none !important; }
        .brick.active-match { transform: scale(1.15); box-shadow: 0 0 20px rgba(0,0,0,0.4); z-index: 5; outline: 3px solid var(--highlight); }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }
        .brick.is-blank { background: #eeeae0; border: 1px dashed #ccc; color: transparent; pointer-events: none; }
        .brick.center-stone { background: var(--wood); font-size: 12px; height: 80px; border: 4px double #fff; width: 100%; grid-column: 1 / -1; }
        
        .lawn { width: 90%; max-width: 600px; height: 60px; background: #8da58e; margin: 20px 0; border-radius: 30px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; border: 3px solid #6d8c6d; }
        
        @media (max-width: 850px) { body { flex-direction: column; overflow: visible; } .map-sidebar { display: none; } .brick { width: 14vw; height: 10vw; font-size: 1.4vw; } }
    </style>
</head>
<body>

    <div class="map-sidebar">
        <h2 style="color:var(--fig-green); margin-top:0;">Garden Locator</h2>
        <div class="map-container" onclick="scrollToPath()">
            <img src="rendering%20of%20garden.avif" alt="Garden Map">
            <div id="locator-dot"></div>
        </div>
        <p style="font-size:0.8rem; color:#444; line-height:1.5; margin-top:20px;">
            <b>Map Key:</b><br>
            • South Section (Red/Top)<br>
            • North Section (Blue/Bottom)<br><br>
            Use <b>NEXT</b> to cycle through multiple families with the same name.
        </p>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Garden Brick Finder</h1>
            <div class="search-controls">
                <input type="text" id="search" placeholder="Enter name...">
                <button id="next-btn">NEXT</button>
            </div>
            <div id="match-count"></div>
        </div>

        <div class="container">
            <h3 style="color:var(--fig-green)">NORTHERN GARDEN PATH</h3>
            <div id="north-section" class="plaza"></div>
            <div class="lawn" id="lawn-anchor">CENTRAL LAWN</div>
            <h3 style="color:var(--fig-green)">SOUTHERN ENTRANCE PATH</h3>
            <div id="south-section" class="plaza"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv';
        let currentMatchIndex = 0;
        let matchedBricks = [];

        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                data.forEach(row => {
                    row.Section = (row.Section || "").trim().split(' ')[0]; 
                    row.Row = parseInt(row.Row) || 0;
                    row.Col = parseInt(row.Col) || 0;
                });
                renderSection('north-section', data.filter(b => b.Section === 'North'), 42); 
                renderSection('south-section', data.filter(b => b.Section === 'South'), 40);
            }
        });

        function renderSection(id, bricks, maxRow) {
            const container = document.getElementById(id);
            const grid = {};
            bricks.forEach(b => { if (!grid[b.Row]) grid[b.Row] = {}; grid[b.Row][b.Col] = b; });

            for (let r = 1; r <= maxRow; r++) {
                const rowData = grid[r] || {};
                if (Object.keys(rowData).length === 0) continue;
                const maxCol = Math.max(...Object.keys(rowData).map(Number));
                const rowWrapper = document.createElement('div');
                rowWrapper.className = 'row-container';
                const label = document.createElement('div'); label.className = 'row-label'; label.innerText = 'R' + r;
                rowWrapper.appendChild(label);
                const rowGrid = document.createElement('div');
                rowGrid.className = 'row-grid';
                rowGrid.style.gridTemplateColumns = `repeat(${maxCol}, 1fr)`;

                for (let c = 1; c <= maxCol; c++) {
                    const brick = rowData[c];
                    const bDiv = document.createElement('div');
                    if (brick) {
                        const isCommons = brick.Inscription && brick.Inscription.includes("COMMONS");
                        const isBlank = (brick.Inscription || "").includes("[BLANK]");
                        bDiv.className = isCommons ? 'brick center-stone' : ('brick' + (isBlank ? ' is-blank' : ''));
                        bDiv.innerText = isBlank ? "" : brick.Inscription;
                        bDiv.dataset.search = (brick.Inscription + " " + (brick["Searchable Names"] || "")).toLowerCase();
                        bDiv.dataset.section = brick.Section;
                    } else { bDiv.className = 'brick is-blank'; }
                    rowGrid.appendChild(bDiv);
                }
                rowWrapper.appendChild(rowGrid);
                container.appendChild(rowWrapper);
            }
        }

        function updateNavigation() {
            const dot = document.getElementById('locator-dot');
            const nextBtn = document.getElementById('next-btn');
            const countLabel = document.getElementById('match-count');

            // Reset classes
            document.querySelectorAll('.brick').forEach(b => b.classList.remove('active-match'));

            if (matchedBricks.length > 0) {
                const current = matchedBricks[currentMatchIndex];
                current.classList.add('active-match');
                current.scrollIntoView({ behavior: 'smooth', block: 'center' });

                dot.style.display = 'block';
                const centerX = '54%'; 
                dot.style.top = (current.dataset.section === 'North') ? '72%' : '34%';
                dot.style.left = centerX;

                nextBtn.style.display = matchedBricks.length > 1 ? 'block' : 'none';
                countLabel.innerText = `Found ${matchedBricks.length} match(es). Showing #${currentMatchIndex + 1}`;
            } else {
                dot.style.display = 'none';
                nextBtn.style.display = 'none';
                countLabel.innerText = "";
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            matchedBricks = [];
            currentMatchIndex = 0;

            document.querySelectorAll('.brick').forEach(b => {
                if (b.classList.contains('center-stone')) return;
                const matches = term !== "" && b.dataset.search && b.dataset.search.includes(term);
                b.classList.toggle('match', matches);
                b.classList.toggle('hidden', term !== "" && !matches);
                if (matches) matchedBricks.push(b);
            });

            updateNavigation();
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            currentMatchIndex = (currentMatchIndex + 1) % matchedBricks.length;
            updateNavigation();
        });

        function scrollToPath() {
            if (matchedBricks[currentMatchIndex]) {
                matchedBricks[currentMatchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
