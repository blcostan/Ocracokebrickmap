<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn | Centered Brick Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --fig-green: #2d5a27; --sand: #fdfaf5;
            --brick: #b06d50; --ocean: #0077be; --wood: #7d6e64;
        }
        body { font-family: 'Georgia', serif; background-color: var(--sand); margin: 0; color: #333; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .map-sidebar {
            width: 300px; background: white; border-right: 2px solid #ddd;
            display: flex; flex-direction: column; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 10;
        }
        .map-sidebar img { width: 100%; border-radius: 4px; border: 1px solid #ccc; cursor: zoom-in; }
        
        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

        .header { position: sticky; top: 0; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px 0; z-index: 1000; text-align: center; border-bottom: 4px solid var(--ocean); }
        #search { padding: 12px 20px; width: 85%; max-width: 400px; border-radius: 25px; border: 2px solid #aec4c2; font-size: 16px; outline: none; }

        .container { padding: 40px 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .plaza { display: inline-flex; flex-direction: column; gap: 6px; padding: 10px; margin-bottom: 30px; align-items: center; }
        
        /* Centering Logic */
        .row-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; /* Centers the whole row group */
            width: 100%;
            position: relative;
            margin-bottom: 2px;
        }
        
        .row-label { 
            position: absolute; 
            left: -40px; /* Keeps labels out of the way of the centered bricks */
            font-size: 10px; 
            color: #bbb; 
            font-family: sans-serif; 
        }
        
        .row-grid { 
            display: grid; 
            gap: 5px; 
            justify-content: center; /* Centers bricks within the grid */
        }
        
        .brick { 
            width: 95px; height: 48px; background: var(--brick); border: 1px solid #4a3728; 
            display: flex; align-items: center; justify-content: center; padding: 4px; 
            font-size: 8px; font-weight: bold; text-align: center; color: white; 
            line-height: 1.1; cursor: pointer; transition: 0.2s; box-shadow: 1px 1px 0 rgba(0,0,0,0.1); 
        }
        
        .brick.is-blank { background: #eeeae0; border: 1px dashed #ccc; color: transparent; pointer-events: none; }
        .brick.match { background: #ffd54f !important; color: #000 !important; transform: scale(1.1); z-index: 5; border: 2px solid orange; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        .brick.hidden { opacity: 0.15; filter: grayscale(1); }
        
        .brick.center-stone { background: var(--wood); font-size: 12px; height: 80px; border: 4px double #fff; width: 100%; grid-column: 1 / -1; }
        
        .lawn { width: 90%; max-width: 600px; height: 60px; background: #8da58e; margin: 20px 0; border-radius: 30px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; border: 3px solid #6d8c6d; }
        .section-tag { font-weight: bold; color: var(--fig-green); margin-bottom: 10px; text-transform: uppercase; font-size: 13px; letter-spacing: 2px; }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow: visible; }
            .map-sidebar { display: none; }
            .main-content { overflow-y: visible; height: auto; }
            .brick { width: 15vw; height: 10vw; font-size: 1.5vw; }
            .row-label { left: 2px; font-size: 8px; }
        }
    </style>
</head>
<body>

    <div class="map-sidebar">
        <h2 style="color:var(--fig-green); margin-top:0;">Reference Map</h2>
        <img src="rendering%20of%20garden.avif" alt="Garden Map" onclick="document.getElementById('mapModal').style.display='flex'">
        <p style="font-size:0.8rem;">Rows are now centered to reflect the actual path layout.</p>
    </div>

    <div id="mapModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:5000; align-items:center; justify-content:center;" onclick="this.style.display='none'">
        <img src="rendering%20of%20garden.avif" style="max-width:95%; max-height:90%;">
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Fig Garden Brick Finder</h1>
            <input type="text" id="search" placeholder="Search names...">
        </div>

        <div class="container">
            <div class="section-tag">North Section</div>
            <div id="north-section" class="plaza"></div>
            <div class="lawn">Central Lawn</div>
            <div id="south-section" class="plaza"></div>
            <div class="section-tag">South Section</div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv';

        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                data.forEach(row => {
                    row.Section = String(row.Section).trim();
                    row.Row = parseInt(row.Row);
                    row.Col = parseInt(row.Col);
                });
                renderSection('north-section', data.filter(b => b.Section === 'North'), 42); 
                renderSection('south-section', data.filter(b => b.Section === 'South'), 40);
            }
        });

        function renderSection(id, bricks, maxRow) {
            const container = document.getElementById(id);
            const grid = {};
            bricks.forEach(b => {
                if (!grid[b.Row]) grid[b.Row] = {};
                grid[b.Row][b.Col] = b;
            });

            for (let r = 1; r <= maxRow; r++) {
                const rowData = grid[r] || {};
                if (Object.keys(rowData).length === 0) continue;

                // Find actual count for centering
                const maxColInRow = Math.max(...Object.keys(rowData).map(Number));

                const rowWrapper = document.createElement('div');
                rowWrapper.className = 'row-container';
                
                const label = document.createElement('div');
                label.className = 'row-label';
                label.innerText = 'R' + r;
                rowWrapper.appendChild(label);

                const rowGrid = document.createElement('div');
                rowGrid.className = 'row-grid';
                rowGrid.style.gridTemplateColumns = `repeat(${maxColInRow}, 1fr)`;

                const isCommonsRow = Object.values(rowData).some(b => b.Inscription && b.Inscription.includes("COMMONS"));

                if (isCommonsRow) {
                    const stone = document.createElement('div');
                    stone.className = 'brick center-stone';
                    stone.innerText = "ISLAND INN COMMONS";
                    rowGrid.appendChild(stone);
                } else {
                    for (let c = 1; c <= maxColInRow; c++) {
                        const brick = rowData[c];
                        const bDiv = document.createElement('div');
                        if (brick) {
                            const txt = (brick.Inscription || "").trim();
                            const isBlank = txt === "" || txt === "[BLANK]";
                            bDiv.className = 'brick' + (isBlank ? ' is-blank' : '');
                            bDiv.innerText = isBlank ? "" : txt;
                            bDiv.dataset.search = (txt + " " + (brick["Searchable Names"] || "")).toLowerCase();
                        } else {
                            bDiv.className = 'brick is-blank';
                        }
                        rowGrid.appendChild(bDiv);
                    }
                }
                rowWrapper.appendChild(rowGrid);
                container.appendChild(rowWrapper);
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const t = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.brick').forEach(b => {
                if (b.classList.contains('center-stone')) return;
                const m = b.dataset.search && b.dataset.search.includes(t);
                if (t === "") { b.classList.remove('match', 'hidden'); } 
                else { b.classList.toggle('match', !!m); b.classList.toggle('hidden', !m); }
            });
        });
    </script>
</body>
</html>
