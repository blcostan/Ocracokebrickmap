<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocracoke Memorial Brick Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --brick-bg: #c19a6b; 
            --brick-border: #704214; 
            --highlight: #ffeb3b; 
            --lawn: #739e73;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #e0e0e0; margin: 0; padding: 0; }
        
        .header { 
            position: sticky; top: 0; background: white; padding: 15px; z-index: 1000; 
            border-bottom: 4px solid var(--brick-border); text-align: center;
        }
        input { padding: 12px; width: 80%; max-width: 500px; border-radius: 20px; border: 1px solid #ccc; font-size: 16px; }

        .map-wrapper { display: flex; flex-direction: column; align-items: center; padding: 40px 10px; }
        
        /* The "Masonry" Section */
        .stone-plaza { 
            display: flex; flex-direction: column; gap: 4px; padding: 15px; 
            background: #d3d3d3; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* Staggered Row Logic */
        .row { display: flex; justify-content: center; gap: 4px; }
        .row:nth-child(even) { margin-left: 20px; } /* Mimics running bond pattern */

        .brick {
            width: 130px; height: 60px; background: var(--brick-bg);
            border: 1px solid var(--brick-border); border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            padding: 5px; font-size: 10px; font-weight: bold; text-align: center; 
            cursor: pointer; box-shadow: 2px 2px 2px rgba(0,0,0,0.2);
            transition: 0.2s; color: #3e2723;
        }
        
        .brick:hover { background: #d2b48c; transform: translateY(-2px); }
        .brick.match { background: var(--highlight) !important; border-color: #f57c00; transform: scale(1.1); z-index: 10; }
        .brick.hidden { opacity: 0.2; filter: grayscale(1); }

        /* Environmental Elements */
        .lawn { 
            width: 100%; max-width: 800px; height: 160px; background: var(--lawn); 
            margin: 20px 0; border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; color: white; font-style: italic; font-weight: bold;
        }
        .steps { width: 300px; height: 40px; background: #999; border: 2px solid #666; margin-bottom: 5px; }
        .label { font-weight: bold; color: #555; text-transform: uppercase; margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0 0 10px 0;">Island Inn Commons Brick Finder</h2>
        <input type="text" id="search" placeholder="Search names (e.g., 'Holloman')...">
    </div>

    <div class="map-wrapper">
        <div class="label">Upper Path (Building Side)</div>
        <div id="top-section" class="stone-plaza"></div>
        
        <div class="label">Steps Down</div>
        <div class="steps"></div>
        
        <div class="lawn">GRASS LAWN AREA</div>
        
        <div class="label">Lower Plaza (Star Location)</div>
        <div id="bottom-section" class="stone-plaza"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv';

        Papa.parse(CSV_URL, {
            download: true, header: true,
            complete: function(results) {
                const data = results.data.filter(b => b.Inscription);
                renderSection('top-section', data.filter(b => b['Photo Section'] === 'Photo 1'));
                renderSection('bottom-section', data.filter(b => b['Photo Section'] !== 'Photo 1'));
            }
        });

        function renderSection(id, bricks) {
            const container = document.getElementById(id);
            // Group by Row
            const rows = [...new Set(bricks.map(b => b.Row))].sort((a,b) => {
                if (a === 'Center') return 0;
                return parseInt(a) - parseInt(b);
            });

            rows.forEach(r => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                const rowBricks = bricks.filter(b => b.Row === r).sort((a,b) => parseInt(a.Col) - parseInt(b.Col));
                
                rowBricks.forEach(brick => {
                    const bDiv = document.createElement('div');
                    bDiv.className = 'brick';
                    bDiv.innerText = brick.Inscription;
                    bDiv.onclick = () => alert(brick.Inscription);
                    rowDiv.appendChild(bDiv);
                });
                container.appendChild(rowDiv);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.brick').forEach(b => {
                const match = b.innerText.toLowerCase().includes(term);
                b.classList.toggle('match', term !== '' && match);
                b.classList.toggle('hidden', term !== '' && !match);
            });
        });
    </script>
</body>
</html>
