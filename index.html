<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn Garden Finder</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --fig-green: #9CAF88; 
            --dark-green: #557C4B;
            --sand: #F2EFEA; 
            --brick: #B14A3B; 
            --highlight: #ff3b3b; 
        }
        
        body { font-family: 'Georgia', serif; background: var(--sand); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: #333; }
        
        /* Main Landing Screen */
        .hero-interface { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 20px; position: relative;
        }

        .search-container {
            width: 100%; max-width: 400px; z-index: 10; margin-bottom: 20px;
        }

        #search { 
            width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--fig-green); 
            font-size: 18px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* Large Map Display */
        .main-map-area {
            position: relative; width: 100%; max-width: 600px; 
            background: white; padding: 10px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ddd;
        }
        .main-map-area img { width: 100%; display: block; border-radius: 10px; }

        #map-dot { 
            position: absolute; width: 28px; height: 28px; background: var(--highlight); 
            border: 4px solid white; border-radius: 50%; display: none; 
            box-shadow: 0 0 20px rgba(255, 59, 59, 0.8); z-index: 20; 
            transform: translate(-50%, -50%); cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Full Screen Brick Overlay */
        #brick-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sand); z-index: 1000; display: none;
            flex-direction: column; align-items: center; overflow-y: auto;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .close-overlay {
            position: sticky; top: 20px; margin-bottom: 20px;
            padding: 10px 25px; background: var(--dark-green); color: white;
            border: none; border-radius: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Brick Grid Styling */
        .brick-view { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .row-bricks { display: flex; gap: 6px; margin-bottom: 6px; }
        .brick { 
            width: 95px; min-height: 55px; background: var(--brick); color: white; 
            display: flex; align-items: center; justify-content: center; text-align: center; 
            font-size: 8px; font-weight: bold; padding: 6px; box-sizing: border-box; border-radius: 2px;
        }
        .brick.match { border: 4px solid var(--highlight); transform: scale(1.1); box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        .brick.is-blank { background: #dcd7cc; color: transparent; border: 1px dashed #bbb; }

        .path-title { color: var(--dark-green); font-size: 22px; margin-bottom: 30px; }

        #status-bar { font-size: 10px; color: var(--dark-green); margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="hero-interface">
    <div class="search-container">
        <input type="text" id="search" placeholder="Enter Name to Locate Brick...">
    </div>

    <div class="main-map-area">
        <div id="map-dot" title="Click to View Bricks"></div>
        <img src="rendering%20of%20garden.avif" alt="Garden Map">
    </div>
    
    <div id="status-bar">Connecting to Garden Registry...</div>
</div>

<div id="brick-overlay">
    <button class="close-overlay" onclick="closeBricks()">← Back to Map</button>
    <div class="brick-view" id="brick-content">
        </div>
</div>

<script>
    const S_URL = 'https://duanluepelrjjkulpenh.supabase.co'; 
    const S_KEY = 'sb_publishable_WHslguojU3jb1GyQBqc_MA_2w35Y2ou';
    const gardenClient = window.supabase.createClient(S_URL, S_KEY);

    let allBricks = [];
    let currentSearchTerm = "";

    async function loadData() {
        const { data, error } = await gardenClient.from('Ocracoke Bricks -').select('*');
        if (error) { console.error(error); return; }
        
        allBricks = data.map(row => {
            let rawSec = (row.section || row.Section || "").toString().toLowerCase();
            return {
                ...row,
                MappedSec: rawSec.includes("north") ? "South" : "North",
                R: parseInt(row.row || row.Row) || 0,
                C: parseInt(row.col || row.Col) || 0,
                Inscr: row.inscription || row.Inscription || ""
            };
        });
        document.getElementById('status-bar').innerText = "Registry Loaded.";
    }

    document.getElementById('search').oninput = (e) => {
        currentSearchTerm = e.target.value.toLowerCase().trim();
        const dot = document.getElementById('map-dot');
        
        if (currentSearchTerm === "") {
            dot.style.display = "none";
            return;
        }

        const match = allBricks.find(b => b.Inscr.toLowerCase().includes(currentSearchTerm));
        
        if (match) {
            dot.style.display = "block";
            dot.style.left = "54%";
            dot.style.top = (match.MappedSec === "North") ? "41%" : "66%";
        } else {
            dot.style.display = "none";
        }
    };

    document.getElementById('map-dot').onclick = () => {
        const match = allBricks.find(b => b.Inscr.toLowerCase().includes(currentSearchTerm));
        if (match) {
            showBrickGrid(match.MappedSec);
        }
    };

    function showBrickGrid(sectionName) {
        const container = document.getElementById('brick-content');
        container.innerHTML = `<div class="path-title">${sectionName.toUpperCase()} PATH</div>`;
        
        const sectionBricks = allBricks.filter(b => b.MappedSec === sectionName);
        const grid = {};
        let maxR = 0;
        
        sectionBricks.forEach(b => {
            if (b.R > maxR) maxR = b.R;
            if (!grid[b.R]) grid[b.R] = {};
            grid[b.R][b.C] = b;
        });

        // Draw rows
        for (let r = maxR; r >= 1; r--) {
            if (!grid[r]) continue;
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row-bricks';
            
            const cols = Object.keys(grid[r]).map(Number);
            const maxC = Math.max(...cols);

            for (let c = 1; c <= maxC; c++) {
                const b = grid[r][c];
                const d = document.createElement('div');
                const isBlank = !b || b.Inscr.includes("[BLANK]");
                const isMatch = !isBlank && b.Inscr.toLowerCase().includes(currentSearchTerm);
                
                d.className = isBlank ? 'brick is-blank' : (isMatch ? 'brick match' : 'brick');
                d.innerText = isBlank ? "" : b.Inscr;
                
                rowDiv.appendChild(d);
                if (isMatch) setTimeout(() => d.scrollIntoView({behavior: 'smooth', block: 'center'}), 100);
            }
            container.appendChild(rowDiv);
        }

        document.getElementById('brick-overlay').style.display = 'flex';
    }

    function closeBricks() {
        document.getElementById('brick-overlay').style.display = 'none';
    }

    loadData();
</script>
</body>
</html>
