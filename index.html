<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn Garden Finder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --fig-green: #2d5a27; --sand: #fdfaf5; --brick: #b06d50; --wood: #7d6e64; --highlight: #ff3b3b; }
        body { font-family: 'Georgia', serif; background: var(--sand); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .map-sidebar { width: 320px; background: white; border-right: 2px solid #ddd; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .map-container { position: relative; width: 100%; border: 2px solid #ccc; border-radius: 8px; overflow: hidden; }
        .map-container img { width: 100%; display: block; }
        #locator-dot { position: absolute; width: 20px; height: 20px; background: var(--highlight); border: 2px solid white; border-radius: 50%; display: none; transform: translate(-50%, -50%); z-index: 100; }
        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .plaza { display: inline-flex; flex-direction: column; gap: 4px; margin-bottom: 40px; align-items: center; }
        .row-container { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 2px; }
        .row-label { position: absolute; left: -45px; font-size: 10px; color: #999; }
        .row-grid { display: grid; gap: 4px; }
        .brick { width: 85px; height: 45px; background: var(--brick); border: 1px solid #4a3728; color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 8px; font-weight: bold; padding: 4px; line-height: 1.1; }
        .brick.match { background: #ffd54f !important; color: black !important; border: 2px solid orange; }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }
        .brick.is-blank { background: #eeeae0; border: 1px dashed #ccc; color: transparent; }
        .lawn { width: 200px; height: 50px; background: #8da58e; margin: 20px 0; border-radius: 25px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid #6d8c6d; }
    </style>
</head>
<body>

<div class="map-sidebar">
    <div id="status-bar" style="font-weight:bold; color:var(--fig-green); margin-bottom:10px;">Checking spreadsheet...</div>
    <input type="text" id="search" placeholder="Search a name..." style="padding:10px; border-radius:15px; border:1px solid #ccc; margin-bottom:10px;">
    <div id="match-count" style="font-size:12px; margin-bottom:10px;"></div>
    <div class="map-container" id="map-area">
        <img src="rendering%20of%20garden.avif">
        <div id="locator-dot"></div>
    </div>
</div>

<div class="main-content">
    <h3>NORTHERN GARDEN SECTION</h3>
    <div id="north-section" class="plaza"></div>
    <div class="lawn">LAWN AREA</div>
    <h3>SOUTHERN ENTRANCE SECTION</h3>
    <div id="south-section" class="plaza"></div>
</div>

<script>
    // CACHE BUSTER: Adds a random number so Google doesn't send old data
    const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv';
    const CSV_URL = BASE_URL + '&cachebust=' + Math.random();

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            if(!data || data.length === 0) {
                document.getElementById('status-bar').innerText = "ERROR: Sheet is empty!";
                return;
            }
            document.getElementById('status-bar').innerText = "SUCCESS: " + data.length + " bricks loaded.";
            
            // Map the data with the flipping logic
            data.forEach(row => {
                let sec = String(row.Section || "").trim().toLowerCase();
                // Flip: Spreadsheet South -> North Section | Spreadsheet North -> South Section
                row.MappedSec = sec.includes("south") ? "North" : "South";
                row.R = parseInt(row.Row) || 0;
                row.C = parseInt(row.Col) || 0;
            });

            // Draw Grids
            renderSection('north-section', data.filter(b => b.MappedSec === "North"));
            renderSection('south-section', data.filter(b => b.MappedSec === "South"));
        }
    });

    function renderSection(id, bricks) {
        const container = document.getElementById(id);
        const gridData = {};
        let maxR = 0;

        bricks.forEach(b => {
            if (b.R > maxR) maxR = b.R;
            if (!gridData[b.R]) gridData[b.R] = {};
            gridData[b.R][b.C] = b;
        });

        // Always show R1 closest to the lawn (Row 1 at bottom of North, Row 1 at top of South)
        // To keep it simple: Loop from max down to 1
        for (let r = maxR; r >= 1; r--) {
            if (!gridData[r]) continue;
            const rowWrapper = document.createElement('div');
            rowWrapper.className = 'row-container';
            rowWrapper.innerHTML = `<div class="row-label">R${r}</div>`;
            
            const rowGrid = document.createElement('div');
            rowGrid.className = 'row-grid';
            const maxC = Math.max(...Object.keys(gridData[r]).map(Number));
            rowGrid.style.gridTemplateColumns = `repeat(${maxC}, 1fr)`;

            for (let c = 1; c <= maxC; c++) {
                const b = gridData[r][c];
                const div = document.createElement('div');
                const isBlank = !b || (b.Inscription || "").includes("[BLANK]");
                div.className = isBlank ? 'brick is-blank' : 'brick';
                div.innerText = isBlank ? "" : b.Inscription;
                div.dataset.search = (b ? (b.Inscription + " " + (b["Searchable Names"] || "")) : "").toLowerCase();
                div.dataset.sec = b ? b.MappedSec : "";
                rowGrid.appendChild(div);
            }
            rowWrapper.appendChild(rowGrid);
            container.appendChild(rowWrapper);
        }
    }

    document.getElementById('search').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase().trim();
        const all = document.querySelectorAll('.brick');
        let count = 0;
        all.forEach(b => {
            const match = term !== "" && b.dataset.search.includes(term);
            b.classList.toggle('match', match);
            b.classList.toggle('hidden', term !== "" && !match);
            if(match) count++;
        });
        document.getElementById('match-count').innerText = term ? count + " found" : "";
    });
</script>

</body>
</html>
