<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn Garden Finder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --fig-green: #2d5a27; --sand: #fdfaf5; --brick: #b06d50; --highlight: #ff3b3b; }
        body { font-family: 'Georgia', serif; background: var(--sand); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--fig-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .map-sidebar { width: 320px; background: white; border-right: 2px solid #ddd; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; z-index: 10; flex-shrink: 0; }
        .map-container { position: relative; width: 100%; border: 2px solid #ccc; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .map-container img { width: 100%; display: block; }
        
        #locator-dot { position: absolute; width: 22px; height: 22px; background: var(--highlight); border: 3px solid white; border-radius: 50%; display: none; transform: translate(-50%, -50%); z-index: 100; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }

        .main-content { flex: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; scroll-behavior: smooth; }
        .search-area { display: flex; gap: 8px; margin-bottom: 10px; }
        #search { padding: 12px; flex: 1; border-radius: 20px; border: 2px solid #ccc; font-size: 16px; outline: none; }
        #next-btn { padding: 10px 15px; border-radius: 20px; border: none; background: var(--fig-green); color: white; cursor: pointer; font-weight: bold; display: none; }
        
        .plaza { display: flex; flex-direction: column; gap: 6px; margin-bottom: 60px; align-items: center; }
        .row-container { display: flex; align-items: center; justify-content: center; position: relative; padding: 2px 0; }
        .row-label { position: absolute; left: -50px; font-size: 11px; font-weight: bold; color: #777; width: 40px; text-align: right; }
        
        /* Flexbox Row: No overlapping possible */
        .row-bricks { display: flex; gap: 4px; justify-content: center; }
        
        .brick { 
            width: 90px; height: 48px; background: var(--brick); border: 1px solid #4a3728; 
            color: white; display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 9px; font-weight: bold; padding: 5px; 
            line-height: 1.1; box-sizing: border-box; flex-shrink: 0;
        }
        
        .brick.match { background: #ffd54f !important; color: black !important; border: 2px solid orange; }
        .brick.active-match { transform: scale(1.15); box-shadow: 0 0 20px rgba(0,0,0,0.5); outline: 4px solid var(--highlight); z-index: 50; }
        .brick.hidden { opacity: 0.1; filter: grayscale(1); }
        .brick.is-blank { background: #e0dcd0; border: 1px dashed #bbb; color: transparent; }
        
        .lawn { width: 400px; height: 60px; background: #8da58e; margin: 30px 0; border-radius: 30px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid #6d8c6d; letter-spacing: 3px; font-size: 18px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>Cleaning up the garden...</p>
</div>

<div class="map-sidebar">
    <div id="status-bar" style="font-weight:bold; color:var(--fig-green); margin-bottom:10px; font-size: 12px;">Syncing...</div>
    <div class="search-area">
        <input type="text" id="search" placeholder="Type a name...">
        <button id="next-btn">NEXT</button>
    </div>
    <div id="match-count" style="font-size:13px; margin-bottom:10px; font-weight: bold; color: var(--highlight);"></div>
    <div class="map-container" onclick="scrollToCurrent()">
        <img src="rendering%20of%20garden.avif">
        <div id="locator-dot"></div>
    </div>
</div>

<div class="main-content">
    <h2 style="color:var(--fig-green); margin-top:0;">NORTH PATH</h2>
    <div id="north-section" class="plaza"></div>
    
    <div class="lawn">CENTRAL LAWN</div>
    
    <h2 style="color:var(--fig-green)">SOUTH PATH (ENTRANCE)</h2>
    <div id="south-section" class="plaza"></div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv&cache=' + Date.now();

    let matchedBricks = [];
    let currentMatchIndex = 0;

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            initApp(results.data);
        }
    });

    function initApp(data) {
        document.getElementById('loader').style.display = 'none';
        
        data.forEach(row => {
            let sec = String(row.Section || "").trim().toLowerCase();
            // Spreadsheet North = South Path | Spreadsheet South = North Path
            row.MappedSec = sec.includes("north") ? "South" : "North";
            row.R = parseInt(row.Row) || 0;
            row.C = parseInt(row.Col) || 0;
        });

        // NORTH: Row 1 near Lawn (reversed order)
        renderSection('north-section', data.filter(b => b.MappedSec === "North"), true);
        // SOUTH: Row 1 at Entrance (standard order)
        renderSection('south-section', data.filter(b => b.MappedSec === "South"), false);
        
        document.getElementById('status-bar').innerText = "Garden Live: " + data.length + " bricks";
    }

    function renderSection(id, bricks, isReversed) {
        const container = document.getElementById(id);
        const gridData = {};
        let maxR = 0;

        bricks.forEach(b => {
            if (b.R > maxR) maxR = b.R;
            if (!gridData[b.R]) gridData[b.R] = {};
            gridData[b.R][b.C] = b;
        });

        const start = isReversed ? maxR : 1;
        const end = isReversed ? 1 : maxR;
        const step = isReversed ? -1 : 1;

        for (let r = start; isReversed ? r >= end : r <= end; r += step) {
            if (!gridData[r]) continue;
            
            const rowWrapper = document.createElement('div');
            rowWrapper.className = 'row-container';
            rowWrapper.innerHTML = `<div class="row-label">R${r}</div>`;
            
            const rowBricks = document.createElement('div');
            rowBricks.className = 'row-bricks';
            
            const colIndices = Object.keys(gridData[r]).map(Number);
            const maxC = Math.max(...colIndices);

            for (let c = 1; c <= maxC; c++) {
                const b = gridData[r][c];
                const div = document.createElement('div');
                const isBlank = !b || (b.Inscription || "").includes("[BLANK]");
                
                div.className = isBlank ? 'brick is-blank' : 'brick';
                div.innerText = isBlank ? "" : b.Inscription;
                div.dataset.search = (b ? (b.Inscription + " " + (b["Searchable Names"] || "")) : "").toLowerCase();
                div.dataset.sec = b ? b.MappedSec : "";
                
                rowBricks.appendChild(div);
            }
            rowWrapper.appendChild(rowBricks);
            container.appendChild(rowWrapper);
        }
    }

    document.getElementById('search').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase().trim();
        matchedBricks = [];
        currentMatchIndex = 0;
        document.querySelectorAll('.brick').forEach(b => {
            const match = term !== "" && b.dataset.search.includes(term);
            b.classList.toggle('match', match);
            b.classList.toggle('hidden', term !== "" && !match);
            if(match) matchedBricks.push(b);
        });
        updateNavigation();
    });

    function updateNavigation() {
        const dot = document.getElementById('locator-dot');
        const nextBtn = document.getElementById('next-btn');
        const countDisplay = document.getElementById('match-count');
        document.querySelectorAll('.brick').forEach(b => b.classList.remove('active-match'));

        if (matchedBricks.length > 0) {
            const current = matchedBricks[currentMatchIndex];
            current.classList.add('active-match');
            dot.style.display = 'block';
            dot.style.left = "54%";
            dot.style.top = (current.dataset.sec === "North") ? "35%" : "70%";
            nextBtn.style.display = matchedBricks.length > 1 ? 'block' : 'none';
            countDisplay.innerText = `${matchedBricks.length} Found (#${currentMatchIndex + 1})`;
        } else {
            dot.style.display = 'none';
            nextBtn.style.display = 'none';
            countDisplay.innerText = "";
        }
    }

    document.getElementById('next-btn').onclick = () => {
        currentMatchIndex = (currentMatchIndex + 1) % matchedBricks.length;
        updateNavigation();
        scrollToCurrent();
    };

    function scrollToCurrent() {
        if (matchedBricks[currentMatchIndex]) {
            matchedBricks[currentMatchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
</script>
</body>
</html>
