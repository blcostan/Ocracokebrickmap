<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Inn | Garden Brick Finder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --fig-green: #2d5a27; --sand: #fdfaf5; --brick: #b06d50; --ocean: #0077be; --wood: #7d6e64; --highlight: #ff3b3b; }
        body { font-family: 'Georgia', serif; background-color: var(--sand); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .map-sidebar { width: 320px; background: white; border-right: 2px solid #ddd; display: flex; flex-direction: column; padding: 20px; z-index: 10; overflow-y: auto; }
        .map-container { position: relative; width: 100%; border: 3px solid #ccc; border-radius: 8px; overflow: hidden; cursor: pointer; background: #eee; }
        .map-container img { width: 100%; display: block; }
        
        #locator-dot {
            position: absolute; width: 24px; height: 24px; background: var(--highlight); 
            border: 3px solid white; border-radius: 50%; display: none;
            box-shadow: 0 0 20px rgba(255, 59, 59, 1); z-index: 20; 
            transform: translate(-50%, -50%); animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } }

        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }
        .search-controls { display: flex; gap: 8px; justify-content: center; align-items: center; width: 95%; max-width: 500px; margin: 0 auto; }
        #search { padding: 12px 15px; flex: 1; border-radius: 25px; border: 2px solid #aec4c2; font-size: 16px; outline: none; }
        #next-btn { padding: 10px 15px; border-radius: 20px; border: none; background: var(--fig-green); color: white; cursor: pointer; font-weight: bold; display: none; }
        
        /* Debug Status Bar */
        #status-bar { font-size: 10px; color: #888; margin-bottom: 10px; text-align: center; }

        .container { padding: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .plaza { display: inline-flex; flex-direction: column; gap: 4px; padding: 10px; margin-bottom: 30px; align-items: center; min-height: 50px; }
        .row-container { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; margin-bottom: 2px; }
        .row-label { position: absolute; left: -40px; font-size: 9px; color: #bbb; }
        .row-grid { display: grid; gap: 4px; justify-content: center; }
        
        .brick { width: 80px; height: 42px; background: var(--brick); border: 1px solid #4a3728; display: flex; align-items: center; justify-content: center; padding: 4px; font-size: 8px; font-weight: bold; text-align: center; color: white; line-height: 1.1; }
        .brick.match { background: #ffd54f !important; color: #000 !important; border: 2px solid orange; }
        .brick.active-match { transform: scale(1.1); box-shadow: 0 0 15px rgba(0,0,0,0.4); z-index: 5; outline: 3px solid var(--highlight); }
        .brick.hidden { opacity: 0.15; filter: grayscale(1); }
        .brick.is-blank { background: #eeeae0; border: 1px dashed #ccc; color: transparent; pointer-events: none; }
        .brick.is-commons { background: var(--wood); border: 2px solid #fff; }
        
        .lawn { width: 90%; max-width: 500px; height: 50px; background: #8da58e; margin: 20px 0; border-radius: 25px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border: 2px solid #6d8c6d; }
    </style>
</head>
<body>

    <div class="map-sidebar">
        <div id="status-bar">Connecting to Spreadsheet...</div>
        <div class="search-controls" style="margin-bottom:15px;">
            <input type="text" id="search" placeholder="Search a name...">
            <button id="next-btn">NEXT</button>
        </div>
        <div id="match-count" style="text-align:center; margin-bottom:10px; font-size:12px;"></div>

        <div class="map-container" onclick="scrollToPath()">
            <img src="rendering%20of%20garden.avif" alt="Garden Map">
            <div id="locator-dot"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <h3>NORTHERN GARDEN SECTION</h3>
            <div id="north-section" class="plaza"></div>
            <div class="lawn">Central Lawn Area</div>
            <h3>SOUTHERN ENTRANCE SECTION</h3>
            <div id="south-section" class="plaza"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3j2xmIEyMKMz7nwsVM4HaZuXtBTQmyyJijPGkhQULJQbB2NcD0ZnrW_WWTKYe4FmD6WsZjD_TXh6-/pub?output=csv';
        let currentMatchIndex = 0;
        let matchedBricks = [];

        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            error: function(err) { document.getElementById('status-bar').innerText = "Error loading CSV: " + err; },
            complete: function(results) {
                const data = results.data;
                document.getElementById('status-bar').innerText = "Loaded " + data.length + " rows from sheet.";

                data.forEach(row => {
                    let rawSec = String(row.Section || "").trim();
                    // FLIP LOGIC
                    if (rawSec.startsWith('North')) row.MappedSection = 'South';
                    else if (rawSec.startsWith('South')) row.MappedSection = 'North';
                    else row.MappedSection = rawSec;

                    row.Row = parseInt(row.Row) || 0;
                    row.Col = parseInt(row.Col) || 0;
                });

                renderSection('north-section', data.filter(b => b.MappedSection === 'North'), true); 
                renderSection('south-section', data.filter(b => b.MappedSection === 'South'), true);
            }
        });

        function renderSection(id, bricks, rowOneAtBottom) {
            const container = document.getElementById(id);
            if (bricks.length === 0) { container.innerHTML = "<p style='color:red'>No data for this section</p>"; return; }

            const grid = {};
            let maxR = 0;
            bricks.forEach(b => { 
                if (b.Row > maxR) maxR = b.Row;
                if (!grid[b.Row]) grid[b.Row] = {}; 
                grid[b.Row][b.Col] = b; 
            });

            // Loop through all possible rows found in data
            for (let r = (rowOneAtBottom ? maxR : 1); rowOneAtBottom ? r >= 1 : r <= maxR; rowOneAtBottom ? r-- : r++) {
                const rowData = grid[r];
                if (!rowData) continue; 

                const rowWrapper = document.createElement('div');
                rowWrapper.className = 'row-container';
                rowWrapper.innerHTML = `<div class="row-label">R${r}</div>`;
                
                const rowGrid = document.createElement('div');
                rowGrid.className = 'row-grid';
                const cols = Object.keys(rowData).map(Number);
                const maxC = Math.max(...cols);
                rowGrid.style.gridTemplateColumns = `repeat(${maxC}, 1fr)`;

                for (let c = 1; c <= maxC; c++) {
                    const brick = rowData[c];
                    const bDiv = document.createElement('div');
                    if (brick) {
                        const isCommons = (brick.Inscription || "").includes("COMMONS");
                        const isBlank = (brick.Inscription || "").includes("[BLANK]");
                        bDiv.className = isCommons ? 'brick is-commons' : ('brick' + (isBlank ? ' is-blank' : ''));
                        bDiv.innerText = isBlank ? "" : brick.Inscription;
                        bDiv.dataset.search = (brick.Inscription + " " + (brick["Searchable Names"] || "")).toLowerCase();
                        bDiv.dataset.section = brick.MappedSection;
                    } else { bDiv.className = 'brick is-blank'; }
                    rowGrid.appendChild(bDiv);
                }
                rowWrapper.appendChild(rowGrid);
                container.appendChild(rowWrapper);
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value
